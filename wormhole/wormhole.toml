# The active editor: source of truth for wormhole and for editor-aware shell
# functions/tools (queried live via `wormhole editor`). Switch with either
# `wormhole editor <name>` (writes back here) or by editing this line and
# running `wormhole refresh`. One of: cursor, code, code-insiders, emacs, idea,
# pycharm, pycharm-ce, none.
editor = "code"

search_paths = [
    "~/src/temporal-all/repos",
    "~/src",
    "~/src/devenv",
]

card_commands = [
    "ls .task",
    "git log --format='%an|%ar|%s' -n 3 | awk -F'|' '{split($1,a,\" \"); gsub(/ ago$/,\"\",$2); printf \"%-10s %-15s %s\\n\", a[1], $2, $3}'",
]

[available]
exclude = [
    "devenv",
]
