set -g default-shell /opt/homebrew/bin/zsh
set -g status off
set -g -s escape-time 1
set -g history-limit 10000
set -wg mode-style bg=white,fg=red
set -g bell-action none
set -g visual-bell off

set -g pane-active-border-style fg=red
set -g window-style 'fg=default,bg=#EEEEEE'
set -g window-active-style 'fg=default,bg=#FFFFFF'

# This would allow mouse scrolling, but would necessitate holding shift to use hyperlinks.
# https://github.com/alacritty/alacritty/issues/1194
# https://github.com/alacritty/alacritty/issues/8129
# set -g mouse on
# set -ga terminal-overrides ',*:smcup@:rmcup@'

# https://github.com/tmux/tmux/issues/911#issuecomment-427944765
# nicm's comment says to use -as
set -ga terminal-overrides ',*:Hls=\E]8;id=%p1%s;%p2%s\E\\:Hlr=\E]8;;\E\\'
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
# Alacritty's TERM is forced to xterm-256color, whose Se resets the cursor to
# steady block (\E[2 q). Reset to the terminal default (\E[0 q) instead, so
# Alacritty's configured Beam shape is honored
set -ag terminal-overrides ",xterm-256color:Se=\\E[0 q"

bind-key - last-window
bind-key '"' split-window -c "#{pane_current_path}"
bind-key '%' split-window -h -c "#{pane_current_path}"
bind-key / choose-window
bind-key \\ choose-session
bind-key c new-window -c "#{pane_current_path}"
bind-key C-w run-shell "tmux save-buffer /tmp/tmux-buffer ; pbcopy < /tmp/tmux-buffer"
bind-key M-w run-shell "tmux save-buffer /tmp/tmux-buffer ; pbcopy < /tmp/tmux-buffer"
bind-key S-Down next-window
bind-key S-Up previous-window
bind-key x kill-pane # i.e. without confirm
bind-key r source-file ~/.tmux.conf \; display-message "config reloaded."
bind-key -n M-x display-popup -E -w 60% -h 70% -b rounded -T "" "$HOME/bin/f-open-app"
bind-key -n M-Space display-popup -E -w 60% -h 70% -b rounded -T "" "SKIP_XOLMIS=1 zsh"

# tide: per-project persistent browser windows (files/search/git). Edit is a
# micro child of a browser (Ctrl-C pops back). Context is passed so tide acts on
# the pane where the key fired; pressing the current view's key toggles back to
# the work window.
bind-key -n M-j run-shell -b "$HOME/.local/bin/tide files  '#{window_name}' '#{@project}' '#{@view}' '#{pane_current_path}' '#{session_name}'"
bind-key -n M-k run-shell -b "$HOME/.local/bin/tide search '#{window_name}' '#{@project}' '#{@view}' '#{pane_current_path}' '#{session_name}'"
bind-key -n M-l run-shell -b "$HOME/.local/bin/tide git    '#{window_name}' '#{@project}' '#{@view}' '#{pane_current_path}' '#{session_name}'"
